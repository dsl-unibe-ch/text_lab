---
cluster: "ubelix"

form:
  - auto_accounts
  - time
  - advanced_mode
  - partition
  - qos
  - gpu
  - gpu_number
  - wckey
  - reservation

attributes:
  time:
    widget: "number_field"
    label: "Job Time (hours)"
    min: 1
    max: 24
    step: 1
    value: "1"
    help: "Total time you plan to use Text Lab for in hours. e.g. 1 means 1:00:00 hour."

  advanced_mode:
    widget: "check_box"
    label: "Advanced Slurm Options"
    help: "Check this box to manually select the GPU type, partition, QoS, and other advanced Slurm parameters."
    html_options:
      data:
        hide-partition-when-un-checked: true
        hide-qos-when-un-checked: true
        hide-gpu-when-un-checked: true
        hide-gpu-number-when-un-checked: true
        hide-wckey-when-un-checked: true
        hide-reservation-when-un-checked: true

  partition:
    widget: "select"
    label: "SLURM Partition"
    options:
      - ["gpu", "gpu"]
      - ["gpu-invest", "gpu-invest"]
    value: "gpu"

  qos:
    widget: "select"
    label: "Quality of Service (QoS)"
    options:
      - ["job_gratis", "job_gratis"]
      - ["job_gpu", "job_gpu"]
      - ["job_gpu_preemptable", "job_gpu_preemptable"]
    value: "job_gratis"
    help: >
      Choose a QoS that matches your account and partition

  gpu:
    widget: "select"
    label: "GPU Type"
    options:
      - ["rtx4090", "gpu:rtx4090:"]
      - ["A100", "gpu:a100:"]
      - ["H100", "gpu:h100:"]
      - ["H200", "gpu:h200:"]
    value: "gpu:h100:"
    help: "Use A100 or H100 with 'job_gpu_preemptable' option from the 'qos'"

  gpu_number:
     widget: "number_field"
     label: "Number of GPU(s) requested"
     min: 1
     max: 6
     step: 1
     value: "1"
     help: "Number of GPUs. Ask for more than 1 in case you plan to run large LLMs."

  wckey:
    widget: "text_field"
    label: "wckey"
    help: 'Provide a valid project identifier ("wckey") for accounting. (Optional when using the gratis account.)'

  reservation:
    widget: "text_field"
    label: "Reservation"
    help: "(optional) Name of active Slurm reservation to use for this session."
